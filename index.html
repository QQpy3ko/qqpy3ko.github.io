<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Выдача вкуснях</title>
  <style>
    body {
      font-family: Georgia, serif;
      max-width: 600px;
      margin: 60px auto;
      padding: 0 20px;
      line-height: 1.6;
      color: #2b2b2b;
    }
    p { margin: 0.4em 0; }
    .form-row {
      margin: 24px 0;
      display: flex;
      gap: 8px;
    }
    input[type="text"] {
      flex: 1;
      padding: 8px 12px;
      font-size: 16px;
      border: 1px solid #bbb;
      border-radius: 4px;
    }
    button {
      padding: 8px 18px;
      font-size: 16px;
      cursor: pointer;
      border: 1px solid #888;
      border-radius: 4px;
      background: #f5f5f5;
    }
    button:hover { background: #e8e8e8; }
    .signature { margin-top: 32px; font-style: italic; }
    .status { margin-top: 12px; font-size: 14px; }
    .status.ok  { color: #2a7a2a; }
    .status.err { color: #b22; }
  </style>
</head>
<body>

  <p>Добудьте номер ключа средь yummy неизведанных гор.</p>
  <p>Ввежите номер ключа и жмякайте «послати».</p>
  <p>Количество попыток жестконько ограничено. 😏</p>

  <form id="key-form" action="https://formspree.io/f/xojrjley" method="POST">
    <div class="form-row">
      <input type="text" name="key" placeholder="номер ключа" required autocomplete="off">
      <button type="submit">послати</button>
    </div>
    <div id="status" class="status"></div>
  </form>

  <p class="signature">
    С уваженьицем к Rogava,<br>
    команда выдачи yummy.
  </p>

  <script>
    const form = document.getElementById('key-form');
    const status = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      status.className = 'status';
      status.textContent = 'отправляем...';

      try {
        const res = await fetch(form.action, {
          method: 'POST',
          body: new FormData(form),
          headers: { 'Accept': 'application/json' }
        });
        if (res.ok) {
          status.className = 'status ok';
          status.textContent = 'отправлено ✓';
          form.reset();
        } else {
          const data = await res.json().catch(() => ({}));
          status.className = 'status err';
          status.textContent = data.errors?.map(x => x.message).join(', ') || 'ошибка отправки';
        }
      } catch {
        status.className = 'status err';
        status.textContent = 'сеть подвела, попробуйте ещё раз';
      }
    });
  </script>

</body>
</html>
